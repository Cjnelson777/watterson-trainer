<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watterson Role-Play Trainer</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; background: #f8f9fa; text-align: center; }
        h1 { color: #00205b; }
        button { padding: 12px 24px; margin: 10px; background: #4d6995; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; }
        #history { height: 60vh; overflow-y: auto; padding: 15px; background: white; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ccc; }
        .message { margin: 12px 0; padding: 12px; border-radius: 12px; max-width: 80%; }
        .prospect { background: #e8ecef; text-align: left; }
        .user { background: #4d6995; color: white; text-align: right; margin-left: auto; }
        #input { width: 100%; padding: 12px; font-size: 1em; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        #sendBtn { padding: 12px 24px; background: #4d6995; color: white; border: none; border-radius: 8px; cursor: pointer; }
        #feedback { margin-top: 20px; padding: 15px; background: #fff; border-radius: 12px; display: none; }
        #status { margin: 20px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

    <div id="status">JS Loaded — click a scenario button</div>
    <h1>Watterson Role-Play Trainer</h1>
    <p>Choose starting scenario:</p>
    <button id="coldCallBtn">Cold Call</button>
    <button id="tradeshowBtn">Tradeshow Booth Chat</button>
    <button id="virtualBtn">Virtual Discovery Meeting</button>
    <button id="followupBtn">Follow-up Email Reply</button>

    <div id="history"></div>
    <textarea id="input" placeholder="Type your response..."></textarea>
    <button id="sendBtn">Send</button>
    <div id="feedback"></div>

    <script>
        let scenario = '';
        let history = [];

        // Global functions
        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.textContent = text;
            document.getElementById('history').appendChild(div);
            div.scrollIntoView({ behavior: "smooth" });
            history.push({ role: sender === 'user' ? 'user' : 'assistant', content: text });
        }

        function startRolePlay(type) {
            scenario = type;
            document.getElementById('history').innerHTML = '';
            history = [];
            let opener = '';
            if (type === 'cold-call') opener = "Hi, this is Sarah from facilities at [Retail Chain]. How can I help?";
            if (type === 'tradeshow') opener = "Hey, saw you at the booth — what does Watterson do exactly?";
            if (type === 'virtual') opener = "Hi Chris, thanks for the call. What's on your mind today?";
            if (type === 'follow-up') opener = "Hi Chris, got your email. Tell me more about how you can help.";
            addMessage('prospect', opener);
            document.getElementById('status').textContent = 'Scenario started: ' + type;
        }

        async function sendMessage() {
            const input = document.getElementById('input');
            const msg = input.value.trim();
            if (!msg) return;

            addMessage('user', msg);
            input.value = '';

            try {
                const res = await fetch('https://api.x.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'grok-beta',
                        messages: [
                            { role: 'system', content: `You are Sarah, a facilities manager at a multi-site ${scenario === 'cold-call' ? 'retail chain' : scenario === 'tradeshow' ? 'QSR brand at a tradeshow' : 'hotel group'}. Be realistic, skeptical but fair, use industry terms (downtime, KPIs, CMMS, vendors), push back naturally, cycle subtle personality variations. Conversation so far:\n${history.map(h => `${h.role}: ${h.content}`).join('\n')}` },
                            { role: 'user', content: msg }
                        ],
                        max_tokens: 250,
                        temperature: 0.85
                    })
                });

                if (!res.ok) throw new Error(await res.text());

                const data = await res.json();
                const reply = data.choices[0].message.content;
                addMessage('prospect', reply);
            } catch (err) {
                addMessage('prospect', `(Error: ${err.message}. Check key/internet.)`);
            }
        }

        // Attach listeners directly
        document.getElementById('coldCallBtn').addEventListener('click', () => startRolePlay('cold-call'));
        document.getElementById('tradeshowBtn').addEventListener('click', () => startRolePlay('tradeshow'));
        document.getElementById('virtualBtn').addEventListener('click', () => startRolePlay('virtual'));
        document.getElementById('followupBtn').addEventListener('click', () => startRolePlay('follow-up'));
        document.getElementById('sendBtn').addEventListener('click', sendMessage);

        const input = document.getElementById('input');
        input.addEventListener('keypress', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('sendBtn').click();
            }
        });

        document.getElementById('status').textContent = 'JS Loaded Successfully — click a scenario button';
    </script>
</body>
</html>
