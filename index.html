<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watterson Role-Play Trainer</title>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; background: #f8f9fa; }
        h1 { color: #00205b; text-align: center; }
        #history { height: 60vh; overflow-y: auto; padding: 15px; background: white; border-radius: 12px; margin-bottom: 15px; }
        .message { margin: 12px 0; padding: 12px; border-radius: 12px; max-width: 80%; }
        .prospect { background: #e8ecef; }
        .user { background: #4d6995; color: white; text-align: right; margin-left: auto; }
        #input { width: 100%; padding: 12px; font-size: 1em; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; }
        button { padding: 12px 24px; background: #4d6995; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
        #feedback { margin-top: 20px; padding: 15px; background: #fff; border-radius: 12px; display: none; }
    </style>
</head>
<body>

    <h1>Watterson Role-Play Trainer</h1>
    <p>Choose starting scenario:</p>
    <button onclick="startRolePlay('cold-call')">Cold Call</button>
    <button onclick="startRolePlay('tradeshow')">Tradeshow Booth Chat</button>
    <button onclick="startRolePlay('virtual')">Virtual Discovery Meeting</button>
    <button onclick="startRolePlay('follow-up')">Follow-up Email Reply</button>

    <div id="history"></div>
    <textarea id="input" placeholder="Type your response..."></textarea>
    <button onclick="sendMessage()">Send</button>
    <div id="feedback"></div>

    <script>
        const API_KEY = process.env.API_KEY || 'YOUR_NEW_KEY_HERE_FOR_LOCAL_TEST'; // Use env var on Vercel

        let history = [];
        let scenario = '';

        function addMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.textContent = text;
            document.getElementById('history').appendChild(div);
            div.scrollIntoView();
            history.push({ role: sender === 'user' ? 'user' : 'assistant', content: text });
        }

        async function sendMessage() {
            const input = document.getElementById('input');
            const msg = input.value.trim();
            if (!msg) return;

            addMessage('user', msg);
            input.value = '';

            try {
                const res = await fetch('https://api.x.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'grok-beta',
                        messages: [
                            { role: 'system', content: `You are Sarah, a facilities manager at a multi-site ${scenario === 'cold-call' ? 'retail chain' : scenario === 'tradeshow' ? 'QSR brand at a tradeshow' : 'hotel group'}. Be realistic, skeptical but fair, use industry terms (downtime, KPIs, CMMS, vendors), push back on weak pitches, warm up to strong value. Cycle subtle personality variations. Conversation so far:\n${history.map(h => `${h.role}: ${h.content}`).join('\n')}` },
                            { role: 'user', content: msg }
                        ],
                        max_tokens: 250,
                        temperature: 0.85
                    })
                });

                if (!res.ok) throw new Error(await res.text());

                const data = await res.json();
                const reply = data.choices[0].message.content;
                addMessage('prospect', reply);
            } catch (err) {
                addMessage('prospect', `(Error: ${err.message}. Check API key, internet, or xAI status.)`);
            }
        }

        function startRolePlay(type) {
            scenario = type;
            document.getElementById('history').innerHTML = '';
            history = [];
            let opener = '';
            if (type === 'cold-call') opener = "Hi, this is Sarah from facilities. How can I help?";
            if (type === 'tradeshow') opener = "Hey, saw you at the booth — what does Watterson do exactly?";
            if (type === 'virtual') opener = "Hi Chris, thanks for the call. What's on your mind today?";
            if (type === 'follow-up') opener = "Hi Chris, got your email. Tell me more about how you can help.";
            addMessage('prospect', opener);
        }
    </script>
</body>
</html>
